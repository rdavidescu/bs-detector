name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit + Integration tests
        run: npm test

      - name: Coverage report
        run: npm run test:coverage || true
        continue-on-error: true

      - name: Validate manifest
        run: node -e "import('fs').then(f => { const m = JSON.parse(f.readFileSync('./src/manifest.json','utf-8')); if(m.manifest_version !== 3) process.exit(1); console.log('✅ Manifest valid (MV3)'); })"

