<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BS Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>BS Detector</h1>
      <div class="header-right">
        <span id="status" class="status">Ready</span>
        <button id="settings-btn" class="settings-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="2.5"/>
            <path d="M13.5 8a5.5 5.5 0 0 0-.1-.9l1.4-1.1-.7-1.2-1.7.5a5.5 5.5 0 0 0-.8-.8l.5-1.7-1.2-.7-1.1 1.4a5.5 5.5 0 0 0-.9-.1V1.6h-1.4v1.8a5.5 5.5 0 0 0-.9.1L5.5 2.1l-1.2.7.5 1.7a5.5 5.5 0 0 0-.8.8l-1.7-.5-.7 1.2 1.4 1.1a5.5 5.5 0 0 0-.1.9c0 .3 0 .6.1.9L1.6 10l.7 1.2 1.7-.5c.2.3.5.6.8.8l-.5 1.7 1.2.7 1.1-1.4c.3.1.6.1.9.1s.6 0 .9-.1l1.1 1.4 1.2-.7-.5-1.7c.3-.2.6-.5.8-.8l1.7.5.7-1.2-1.4-1.1c.1-.3.1-.6.1-.9z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="provider-selector-wrapper" class="provider-selector-wrapper" style="display:none;">
      <select id="provider-selector" class="provider-selector"></select>
    </div>

    <button id="analyze-btn">Analyze This Page</button>

    <div id="error-box" class="error-box" style="display:none;"></div>

    <div id="results" style="display:none;">

      <!-- Gauge + Score -->
      <div class="score-section">
        <div id="gauge-container" class="gauge-container">
          <svg id="gauge-svg" viewBox="0 0 200 120" class="gauge-svg"></svg>
          <div class="gauge-value">
            <span id="score-number" class="score-number">--</span>
            <span class="score-label">BS Score</span>
          </div>
        </div>
        <div id="score-band" class="score-band"></div>
        <div id="score-justification" class="score-justification"></div>
        <div id="confidence-line" class="confidence-line">
          <span class="confidence-label">Confidence:</span>
          <span id="confidence-value" class="confidence-value">—</span>
        </div>
      </div>

      <!-- Component Scores (visual first) -->
      <div id="components-section" class="section">
        <h3>Component Scores</h3>
        <div id="components-list"></div>
      </div>

      <!-- Red Flags (no-scroll zone) -->
      <div id="flags-section" class="section flags-section">
        <h3>Red Flags</h3>
        <ul id="flags-list"></ul>
      </div>

      <!-- Summary -->
      <div id="summary-section" class="section">
        <h3>Summary</h3>
        <p id="summary-text"></p>
      </div>

      <!-- Main Claims -->
      <div id="claims-section" class="section">
        <h3>Main Claims</h3>
        <ul id="claims-list"></ul>
      </div>

      <!-- Footer: disclaimer + model -->
      <div id="analysis-footer" class="analysis-footer">
        <span id="suggested-action" class="suggested-action"></span>
        <span id="model-info" class="model-info"></span>
      </div>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
