<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BS Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>BS Detector</h1>
      <span id="status" class="status">Ready</span>
    </div>

    <button id="analyze-btn">Analyze This Page</button>

    <div id="error-box" class="error-box" style="display:none;"></div>

    <div id="results" style="display:none;">
      <div class="score-section">
        <div id="score-display" class="score-display">
          <span id="score-number" class="score-number">--</span>
          <span class="score-label">BS Score</span>
        </div>
        <div id="score-band" class="score-band"></div>
        <div id="score-justification" class="score-justification"></div>
      </div>

      <div id="summary-section" class="section">
        <h3>Summary</h3>
        <p id="summary-text"></p>
      </div>

      <div id="components-section" class="section">
        <h3>Component Scores</h3>
        <div id="components-list"></div>
      </div>

      <div id="claims-section" class="section">
        <h3>Main Claims</h3>
        <ul id="claims-list"></ul>
      </div>

      <div id="flags-section" class="section">
        <h3>Red Flags</h3>
        <ul id="flags-list"></ul>
      </div>

      <div id="meta-section" class="section meta">
        <span id="confidence-badge"></span>
        <span id="suggested-action"></span>
      </div>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
